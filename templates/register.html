<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 诊断学复习</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 50%, #f0fdf4 100%);
      padding: 20px;
    }
    [data-theme="dark"] body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
    .auth-container {
      width: 100%;
      max-width: 420px;
    }
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo .icon { font-size: 48px; display: block; margin-bottom: 12px; }
    .auth-logo h1 {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-logo p { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      background: var(--card-bg);
      color: var(--text);
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
      box-sizing: border-box;
    }
    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
    }
    .auth-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(37,99,235,0.3); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover { text-decoration: underline; }
    .auth-error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    [data-theme="dark"] .auth-error {
      background: #450a0a;
      color: #fca5a5;
      border-color: #ef4444;
    }
    .auth-success {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }
    [data-theme="dark"] .auth-success {
      background: #14532d;
      color: #bbf7d0;
      border-color: #22c55e;
    }
    .password-strength {
      height: 4px;
      border-radius: 2px;
      margin-top: 6px;
      background: var(--border);
      transition: all 0.3s;
    }
    .password-strength.weak { background: #ef4444; width: 33%; }
    .password-strength.medium { background: #f59e0b; width: 66%; }
    .password-strength.strong { background: #22c55e; width: 100%; }
    @media (max-width: 480px) {
      .auth-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="icon">⚕️</span>
        <h1>诊断学复习</h1>
        <p>注册账号，开始备考</p>
      </div>

      <div class="auth-error" id="errorMsg"></div>
      <div class="auth-success" id="successMsg"></div>

      <form id="registerForm" onsubmit="return handleRegister(event)">
        <div class="form-group">
          <label for="email">邮箱</label>
          <input type="email" id="email" placeholder="请输入你的邮箱" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="至少6位密码" required minlength="6" autocomplete="new-password" oninput="checkStrength(this.value)">
          <div class="password-strength" id="strengthBar"></div>
        </div>
        <div class="form-group">
          <label for="confirm">确认密码</label>
          <input type="password" id="confirm" placeholder="再次输入密码" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="auth-btn" id="submitBtn">注 册</button>
      </form>

      <div class="auth-footer">
        已有账号？<a href="/login">立即登录</a>
      </div>
    </div>
  </div>

  <script>
    function checkStrength(pwd) {
      const bar = document.getElementById('strengthBar');
      if (!pwd) { bar.className = 'password-strength'; return; }
      if (pwd.length < 6) { bar.className = 'password-strength weak'; return; }
      const hasLetter = /[a-zA-Z]/.test(pwd);
      const hasNumber = /\d/.test(pwd);
      const hasSpecial = /[^a-zA-Z0-9]/.test(pwd);
      if (hasLetter && hasNumber && hasSpecial && pwd.length >= 8) {
        bar.className = 'password-strength strong';
      } else if ((hasLetter || hasNumber) && pwd.length >= 6) {
        bar.className = 'password-strength medium';
      } else {
        bar.className = 'password-strength weak';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('errorMsg');
      const sucEl = document.getElementById('successMsg');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (!email) {
        errEl.textContent = '请输入邮箱';
        errEl.style.display = 'block';
        return false;
      }
      if (password.length < 6) {
        errEl.textContent = '密码长度至少6位';
        errEl.style.display = 'block';
        return false;
      }
      if (password !== confirm) {
        errEl.textContent = '两次输入的密码不一致';
        errEl.style.display = 'block';
        return false;
      }

      btn.disabled = true;
      btn.textContent = '注册中...';

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, confirm })
        });
        const data = await res.json();

        if (data.ok) {
          sucEl.textContent = '🎉 注册成功！正在跳转...';
          sucEl.style.display = 'block';
          setTimeout(() => { window.location.href = '/'; }, 800);
        } else {
          errEl.textContent = data.msg;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '注 册';
        }
      } catch(e) {
        errEl.textContent = '网络错误，请稍后重试';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '注 册';
      }
      return false;
    }
  </script>
</body>
</html>
